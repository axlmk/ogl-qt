name: Build project on multiple platforms

on:
  push:
    # branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include: 
          # - os: ubuntu-latest
          #   preset: linux-release-clang
          # - os: ubuntu-latest
          #   preset: linux-debug
          - os: windows-latest
            configure: windows-debug-mingw
            build: windows-debug
          # - os: windows-latest
          #   configure: windows-release
          #   build: windows-release

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.0'
        host: windows
        target: desktop
        arch: win64_mingw
        tools: 'tools_mingw1310 tools_ninja'
        setup-python: 'false'

    - name: Check tools
      run: |
        g++ --version
        ninja --version
        cmake --version

    - name: Configure CMake
      run: >
        cmake --preset ${{ matrix.configure }}

    - name: Build
      run: cmake --build --preset ${{ matrix.build }}